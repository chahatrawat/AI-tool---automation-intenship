<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyPortfolioAI – Chahat</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0d11;
      --surface:  #12151c;
      --card:     #181c26;
      --border:   #232840;
      --accent:   #6c6fff;
      --accent2:  #a78bfa;
      --glow:     rgba(108,111,255,0.18);
      --text:     #e8eaf6;
      --muted:    #7b82a3;
      --user-bg:  #1e2235;
      --ai-bg:    #141825;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
    }

    /* ── TOP HEADER ── */
    .top-header {
      width: 100%;
      max-width: 720px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .avatar {
      width: 46px; height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 0 18px var(--glow);
    }
    .header-text h1 {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-text p { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .online-badge {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }
    .online-label { font-size: 11px; color: #4ade80; font-weight: 600; }

    /* ── CHAT CARD ── */
    .chat-card {
      width: 100%;
      max-width: 720px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(108,111,255,0.06);
      overflow: visible;   /* allow children to show fully */
    }

    /* ── SKILLS SECTION (top of card) ── */
    .skills-section {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      border-radius: 20px 20px 0 0;
    }
    .skills-label {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .skills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .skill-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent2);
      font-weight: 500;
      letter-spacing: 0.3px;
      cursor: default;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }
    .skill-tag:hover {
      border-color: var(--accent);
      background: rgba(108,111,255,0.1);
      color: #fff;
    }

    /* ── MESSAGES ── */
    .chat-messages {
      height: 380px;
      overflow-y: auto;
      padding: 20px 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .message {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.22s ease forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message.user { flex-direction: row-reverse; }

    .msg-icon {
      width: 32px; height: 32px; flex-shrink: 0;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      margin-top: 2px;
    }
    .message.ai   .msg-icon { background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: 0 0 10px var(--glow); }
    .message.user .msg-icon { background: var(--user-bg); border: 1px solid var(--border); }

    .msg-body { display: flex; flex-direction: column; max-width: 80%; }
    .message.user .msg-body { align-items: flex-end; }

    .bubble {
      padding: 11px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
    }
    .message.ai   .bubble { background: var(--ai-bg); border: 1px solid var(--border); border-top-left-radius: 4px; }
    .message.user .bubble { background: linear-gradient(135deg, #3b3fd8, #5b52e8); border-top-right-radius: 4px; color: #fff; box-shadow: 0 4px 14px rgba(108,111,255,0.25); }

    .bubble-time {
      font-size: 10px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 4px;
      padding: 0 2px;
    }

    /* ── TYPING ── */
    .typing-dots { display: flex; align-items: center; gap: 5px; padding: 4px 0; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      animation: bop 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bop {
      0%,60%,100% { transform: translateY(0); opacity: 0.45; }
      30%          { transform: translateY(-5px); opacity: 1; }
    }

    /* ── INPUT BAR ── */
    .input-bar {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      background: var(--card);
      border-radius: 0 0 20px 20px;
    }
    #userInput {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #userInput::placeholder { color: var(--muted); }
    #userInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,111,255,0.12); }

    #sendBtn {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px var(--glow);
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    }
    #sendBtn:hover  { transform: scale(1.07); box-shadow: 0 6px 20px var(--glow); }
    #sendBtn:active { transform: scale(0.94); }
    #sendBtn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    #sendBtn svg { width: 18px; height: 18px; fill: #fff; }

    /* ── FOOTER ── */
    .footer {
      width: 100%; max-width: 720px;
      text-align: center;
      margin-top: 14px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .footer span { color: var(--accent); }

    @media (max-width: 500px) {
      .chat-messages { height: 300px; }
      .bubble { font-size: 13px; }
      .msg-body { max-width: 88%; }
    }
  </style>
</head>
<body>

  <!-- TOP HEADER -->
  <div class="top-header">
    <div class="avatar">🤖</div>
    <div class="header-text">
      <h1>MyPortfolioAI</h1>
      <p>Chahat · Gov. Polytechnic Gandhinagar</p>
    </div>
    <div class="online-badge">
      <div class="online-dot"></div>
      <span class="online-label">Online</span>
    </div>
  </div>

  <!-- CHAT CARD -->
  <div class="chat-card">


    <!-- ② MESSAGES -->
    <div class="chat-messages" id="chatMessages"></div>

    <!-- ③ INPUT -->
    <div class="input-bar">
      <textarea id="userInput" rows="1" placeholder="Ask about Chahat's skills, projects…"></textarea>
      <button id="sendBtn" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">Powered by <span>Gemini 2.5 Flash</span> · Portfolio of <span>Chahat</span></div>

<script>
  const API_KEY = "AQ.Ab8RN6JCVrRWKLRlx-f_ZEVZsVocHIQJXFkYZi2wZoAMca9Zwg";
  const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

  const SYSTEM_INSTRUCTION = `You are the personal assistant for my web development portfolio. My name is Chahat, a student of Government Polytechnic Gandhinagar. My skills are:
- HTML
- CSS
- JavaScript
- Python
- ReactJS
- NodeJS
- NextJS
- PHP
- MySQL
- MongoDB
- Machine Learning
- Cyber Security
- Photo Editing
- Database Management
- Web Development

Only answer questions based on this exact data. Refuse all other topics. Be brief.`;

  const chatEl   = document.getElementById("chatMessages");
  const inputEl  = document.getElementById("userInput");
  const sendBtn  = document.getElementById("sendBtn");
  const history  = [];

  function timestamp() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function appendMessage(role, text) {
    const wrap = document.createElement("div");
    wrap.className = `message ${role}`;

    const icon = document.createElement("div");
    icon.className = "msg-icon";
    icon.textContent = role === "ai" ? "🤖" : "👤";

    const body = document.createElement("div");
    body.className = "msg-body";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    const time = document.createElement("div");
    time.className = "bubble-time";
    time.textContent = timestamp();

    body.appendChild(bubble);
    body.appendChild(time);
    wrap.appendChild(icon);
    wrap.appendChild(body);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "message ai"; wrap.id = "typingMsg";
    const icon = document.createElement("div");
    icon.className = "msg-icon"; icon.textContent = "🤖";
    const body = document.createElement("div"); body.className = "msg-body";
    const bubble = document.createElement("div"); bubble.className = "bubble";
    bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
    body.appendChild(bubble);
    wrap.appendChild(icon); wrap.appendChild(body);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typingMsg");
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = ""; inputEl.style.height = "44px";
    sendBtn.disabled = true;

    appendMessage("user", text);
    history.push({ role: "user", parts: [{ text }] });
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
          contents: history
        })
      });
      if (!res.ok) {
        const e = await res.json();
        throw new Error(e?.error?.message || `HTTP ${res.status}`);
      }
      const data = await res.json();
      const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || "No response received.";
      removeTyping();
      appendMessage("ai", reply);
      history.push({ role: "model", parts: [{ text: reply }] });
    } catch (err) {
      removeTyping();
      appendMessage("ai", `⚠️ Error: ${err.message}`);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  window.addEventListener("load", () => {
    appendMessage("ai", "Hi! I am MyPortfolioAI's virtual assistant 👋 I'm here to answer questions about Chahat. Ask me about skills, technologies, or anything related to the portfolio!");
  });
</script>
</body>
</html>

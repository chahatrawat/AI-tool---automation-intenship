```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing Table</title>
</head>

<body style="margin:0; font-family:Arial, sans-serif; background:#f4f4f4;">

<style>
.pricing-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
    gap:20px;
    padding:40px;
    max-width:1000px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    text-align:center;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.pro{
    border:3px solid #007BFF;
}

.btn{
    background:#007BFF;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.btn:hover{
    opacity:0.9;
}
</style>

<h1 style="text-align:center; padding-top:30px; color:#333;">
    Pricing Plans
</h1>

<div class="pricing-grid">

    <div class="card">
        <h2>Basic</h2>
        <h3>₹199/month</h3>
        <p>5 Projects</p>
        <p>10 GB Storage</p>
        <p>Email Support</p>
        <button class="btn">Choose Plan</button>
    </div>

    <div class="card pro">
        <h2>Pro</h2>
        <h3>₹499/month</h3>
        <p>20 Projects</p>
        <p>50 GB Storage</p>
        <p>Priority Support</p>
        <button class="btn">Choose Plan</button>
    </div>

    <div class="card">
        <h2>Enterprise</h2>
        <h3>₹999/month</h3>
        <p>Unlimited Projects</p>
        <p>200 GB Storage</p>
        <p>24/7 Support</p>
        <button class="btn">Choose Plan</button>
    </div>

</div>

</body>
</html>
```
